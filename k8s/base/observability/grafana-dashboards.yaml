# k8s/base/observability/grafana-dashboards.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'llm'
        orgId: 1
        folder: 'LLM Platform'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/llm
      - name: 'kubernetes'
        orgId: 1
        folder: 'Kubernetes'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/k8s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
data:
  llm-platform.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Active Models",
          "description": "How many of the 4 vLLM models are alive. Green=4, Yellow=3, Red<3.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "count(up{job=\"vllm-models\"} == 1)",
              "legendFormat": "Models"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 3
                  },
                  {
                    "color": "green",
                    "value": 4
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total RPS",
          "description": "Combined request rate across all 4 vLLM models.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(vllm:request_success_total{job=\"vllm-models\"}[15m]))",
              "legendFormat": "req/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "P95 Latency (Worst)",
          "description": "Worst P95 end-to-end latency across all models. Under 2s = green.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "max(histogram_quantile(0.95, sum by (le, app)(rate(vllm:e2e_request_latency_seconds_bucket{job=\"vllm-models\"}[15m]))))",
              "legendFormat": "Worst P95"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "min": 0,
              "max": 10,
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 2
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 4,
          "type": "gauge",
          "title": "Queue Depth",
          "description": "Total requests waiting across all models. 0 = ideal. Rising = models overloaded.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(vllm:num_requests_waiting{job=\"vllm-models\"})",
              "legendFormat": "Waiting"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "max": 30,
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 15
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Total Throughput",
          "description": "Combined generation throughput across all models (tokens/sec).",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 0
          },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(vllm:avg_generation_throughput_toks_per_s{job=\"vllm-models\"})",
